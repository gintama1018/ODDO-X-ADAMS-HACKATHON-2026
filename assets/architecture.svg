<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#12253F"/>
    </linearGradient>
    
    <!-- Accent Gradients -->
    <linearGradient id="accent-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="accent-emerald" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#064E3B"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="accent-steel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#64748B"/>
    </linearGradient>
    
    <!-- Card Drop Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="650" rx="15" fill="url(#bg-grad)"/>

  <!-- Outer Border -->
  <rect x="15" y="15" width="970" height="620" rx="12" fill="none" stroke="#1E293B" stroke-width="2"/>

  <!-- Title -->
  <text x="50" y="60" font-family="'Inter', system-ui, sans-serif" font-size="24" font-weight="800" fill="#F8FAFC">TECHVISION HRMS ARCHITECTURE</text>
  <text x="50" y="85" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="400" fill="#94A3B8">High-Performance Client-Side Single Page Application (SPA)</text>

  <!-- ================= CLIENT SIDE USER INTERFACE (LEFT) ================= -->
  <g transform="translate(50, 130)" filter="url(#shadow)">
    <!-- Main Box -->
    <rect width="360" height="450" rx="10" fill="#0F172A" stroke="#334155" stroke-width="1.5"/>
    <rect width="360" height="45" rx="10" fill="#1E293B" clip-path="polygon(0 0, 360 0, 360 45, 0 45)"/>
    <text x="20" y="28" font-family="'Inter', system-ui, sans-serif" font-size="15" font-weight="700" fill="#F8FAFC">Client-Side Runtime (Browser)</text>
    
    <!-- Router Box -->
    <rect x="20" y="65" width="320" height="80" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
    <text x="35" y="95" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="700" fill="#60A5FA">SPA Router (app.js)</text>
    <text x="35" y="115" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#94A3B8">Dynamic view switching &amp; Access Control (RBAC)</text>
    
    <!-- Modules Box -->
    <rect x="20" y="165" width="320" height="255" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
    <text x="35" y="195" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="700" fill="#38BDF8">Functional Modules</text>
    
    <!-- Module Pills -->
    <rect x="35" y="215" width="135" height="40" rx="6" fill="#0F172A" stroke="#334155"/>
    <text x="50" y="240" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600" fill="#E2E8F0">auth.js</text>

    <rect x="185" y="215" width="140" height="40" rx="6" fill="#0F172A" stroke="#334155"/>
    <text x="200" y="240" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600" fill="#E2E8F0">dashboard.js</text>

    <rect x="35" y="270" width="135" height="40" rx="6" fill="#0F172A" stroke="#334155"/>
    <text x="50" y="295" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600" fill="#E2E8F0">attendance.js</text>

    <rect x="185" y="270" width="140" height="40" rx="6" fill="#0F172A" stroke="#334155"/>
    <text x="200" y="295" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600" fill="#E2E8F0">leave.js</text>

    <rect x="35" y="325" width="135" height="40" rx="6" fill="#0F172A" stroke="#334155"/>
    <text x="50" y="350" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600" fill="#E2E8F0">payroll.js</text>

    <rect x="185" y="325" width="140" height="40" rx="6" fill="#0F172A" stroke="#334155"/>
    <text x="200" y="350" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600" fill="#E2E8F0">profile.js</text>
    
    <!-- CSS / Style layer -->
    <rect x="35" y="380" width="290" height="28" rx="4" fill="url(#accent-steel)"/>
    <text x="110" y="398" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#F8FAFC">Style Guide &amp; Design System (styles.css)</text>
  </g>

  <!-- ================= DATABASES & LOCAL STORAGE (RIGHT) ================= -->
  <g transform="translate(590, 130)" filter="url(#shadow)">
    <!-- Main Box -->
    <rect width="360" height="450" rx="10" fill="#0F172A" stroke="#334155" stroke-width="1.5"/>
    <rect width="360" height="45" rx="10" fill="#1E293B" clip-path="polygon(0 0, 360 0, 360 45, 0 45)"/>
    <text x="20" y="28" font-family="'Inter', system-ui, sans-serif" font-size="15" font-weight="700" fill="#F8FAFC">State &amp; Persistence Engine</text>

    <!-- State Controller -->
    <rect x="20" y="65" width="320" height="80" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
    <text x="35" y="95" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="700" fill="#10B981">State Manager (mockData.js)</text>
    <text x="35" y="115" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#94A3B8">In-memory State controller &amp; CRUD helper methods</text>

    <!-- Schema Details Box -->
    <rect x="20" y="165" width="320" height="150" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
    <text x="35" y="195" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="700" fill="#F1F5F9">Indian Localization Schema</text>
    <text x="35" y="220" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#94A3B8">• EPF: 12% Calculation Matrix</text>
    <text x="35" y="240" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#94A3B8">• TDS: Variable Basic Salary Slabs</text>
    <text x="35" y="260" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#94A3B8">• Currency: INR (₹) Numbering system</text>
    <text x="35" y="280" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#94A3B8">• Verification: 6-Digit Simulated OTP Flow</text>

    <!-- LocalStorage representation -->
    <rect x="20" y="335" width="320" height="85" rx="8" fill="#020617" stroke="#10B981" stroke-width="1.5"/>
    <text x="35" y="365" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="800" fill="#34D399">Browser LocalStorage</text>
    <text x="35" y="385" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#94A3B8">Key: hrms_state | Version Control (india-v3)</text>
  </g>

  <!-- ================= FLOW ARROWS & BRIDGES ================= -->
  <!-- Browser to State Controller (Forward) -->
  <path d="M 410 240 L 590 240" fill="none" stroke="#3B82F6" stroke-width="3" stroke-dasharray="6,4"/>
  <polygon points="590,240 580,235 580,245" fill="#3B82F6"/>
  <text x="440" y="225" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="600" fill="#3B82F6">API Calls (CRUD)</text>

  <!-- State Controller to Browser (Response) -->
  <path d="M 590 320 L 410 320" fill="none" stroke="#10B981" stroke-width="3" stroke-dasharray="6,4"/>
  <polygon points="410,320 420,315 420,325" fill="#10B981"/>
  <text x="445" y="342" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="600" fill="#10B981">State Callback</text>

  <!-- Session Storage link -->
  <circle cx="500" cy="460" r="45" fill="#1E293B" stroke="#F59E0B" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="475" y="455" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#F59E0B">session</text>
  <text x="473" y="472" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#94A3B8">Storage</text>
  
  <path d="M 230 460 L 455 460" fill="none" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="3,3"/>
  <path d="M 545 460 L 770 460" fill="none" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="3,3"/>
</svg>
